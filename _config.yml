# The main config file for your Jekyll template

# Site settings
title: Ethan Joyner               # used for the html title of every page
desc: >
  I recently graduated from Morgan State University with a B.S degree in Mechatronics Engineering. I love solving problems and building robots. I am currently looking for a part-time position in the field of robotics and automation. I am also open to freelance work and collaborations.

url: ethanjoyner.xyz      # put your website hosting url here
baseurl: ''                 # the subpath of your site, e.g. /blog
permalink: /:year/:title/   # how should we display posts url

# Meta settings
email: etjoy1@morgan.edu
author: Ethan Joyner
github_username: EthanJoyner
linkedin_username: el2joyner
github_source: jackal

# Put your ga tracking code below
google_analytics: 'UA-XXXXXXXX-X'

# Pagination settings
paginate: 5                           # number of posts to show per page
paginate_path: "/articles/page:num/"  # link scheme for articles, should be letf as is

# Navigation settings
# Used to define the navigation menu items
# > Title is the tile of the navigation item, url the url and desc is the tooltip
navigation:
  
  - title: Projects
    url: /projects/
    desc: My projects and work
  - title: Blog
    url: /blog/
    desc: Tech articles and tutorials of things I have leared.  
  - title: CV
    url: /assets/EthanJoyner-ResumeJune2025.pdf
    desc: My CV and experience
  # - title: My Story
  #   url: /my-story/
  #   desc: Learn about me

# Used by Jekyll to recognize what is a post and what is a page
defaults:
  -
    scope:
      path: ''
      type: posts
    values:
      layout: post

# Markdown parser settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false          # you can change this if you feel like it
  parse_block_html: true    # allow parsing html inside markdown

# Build settings
include:
  - _pages                  # all your pages can be put inside pages (except articles)
exclude:
  - README.md
  - vendor
gems:
  - jekyll-paginate

